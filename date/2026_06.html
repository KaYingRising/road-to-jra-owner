    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const horses = document.querySelectorAll('.galloping-horse');
            
            horses.forEach(horse => {
                // 1周のタイムを「5.0秒 〜 8.0秒」の間でランダムに決定
                const lapTime = (Math.random() * 3 + 5).toFixed(2);
                
                // 上下に弾むリズムも「0.3秒 〜 0.5秒」の間でランダムにズラす
                const bounceTime = (Math.random() * 0.2 + 0.3).toFixed(2);
                
                // CSSの animation-duration（アニメーションの長さ）だけを上書き
                horse.style.animationDuration = `${lapTime}s, ${bounceTime}s`;
            });
        });
    </script>
